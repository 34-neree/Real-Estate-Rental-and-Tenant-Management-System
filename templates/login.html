<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Rental Management</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card fade-in">
      <div class="login-logo">🏢</div>
      <h1>Rental Manager</h1>
      <p class="subtitle">Sign in to manage your properties</p>
      <div id="loginError" style="display:none;background:rgba(231,76,60,0.15);color:#e74c3c;padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:0.85rem;border:1px solid rgba(231,76,60,0.3);"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="admin@rental.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;margin-top:8px;">Sign In</button>
      </form>
      <p style="text-align:center;margin-top:24px;font-size:0.75rem;color:var(--text-muted);">Demo: admin@rental.com / admin123</p>
    </div>
  </div>
  <script src="/static/js/auth.js"></script>
</body>
</html>

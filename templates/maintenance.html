{% extends "base.html" %}
{% block content %}
<div class="toolbar">
  <div class="toolbar-left"></div>
  <button class="btn btn-primary" onclick="resetForm('maintenanceForm');openModal('maintenanceModal')">+ New Request</button>
</div>
<div class="table-container">
  <table><thead><tr><th>ID</th><th>Title</th><th>Property</th><th>Priority</th><th>Status</th><th>Assigned To</th><th>Created</th><th>Actions</th></tr></thead>
  <tbody id="maintenanceTable"><tr><td colspan="8"><div class="spinner"></div></td></tr></tbody></table>
</div>
<div class="modal-overlay" id="maintenanceModal">
  <div class="modal">
    <div class="modal-header"><h2>Maintenance Request</h2><button class="modal-close" onclick="closeModal('maintenanceModal')">&times;</button></div>
    <form id="maintenanceForm" onsubmit="saveMaintenance(event)">
      <div class="form-row"><div class="form-group"><label>Property ID*</label><input name="property_id" type="number" class="form-control" required></div><div class="form-group"><label>Priority</label><select name="priority" class="form-control"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="urgent">Urgent</option></select></div></div>
      <div class="form-group"><label>Title*</label><input name="title" class="form-control" required></div>
      <div class="form-group"><label>Description*</label><textarea name="description" class="form-control" required></textarea></div>
      <div class="form-row"><div class="form-group"><label>Assigned To</label><input name="assigned_to" class="form-control"></div><div class="form-group"><label>Estimated Cost</label><input name="estimated_cost" type="number" step="0.01" class="form-control"></div></div>
      <div class="form-group"><label>Status</label><select name="status" class="form-control"><option value="open">Open</option><option value="in_progress">In Progress</option><option value="resolved">Resolved</option><option value="cancelled">Cancelled</option></select></div>
      <div class="form-group"><label>Notes</label><textarea name="notes" class="form-control"></textarea></div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal('maintenanceModal')">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}<script>document.addEventListener('DOMContentLoaded', loadMaintenance);</script>{% endblock %}

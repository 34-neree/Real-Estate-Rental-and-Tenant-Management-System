{% extends "base.html" %}
{% block content %}
<div class="toolbar">
  <div class="toolbar-left"></div>
  <button class="btn btn-primary" onclick="resetForm('expenseForm');openModal('expenseModal')">+ Add Expense</button>
</div>
<div class="table-container">
  <table><thead><tr><th>ID</th><th>Category</th><th>Amount</th><th>Vendor</th><th>Description</th><th>Date</th><th>Actions</th></tr></thead>
  <tbody id="expensesTable"><tr><td colspan="7"><div class="spinner"></div></td></tr></tbody></table>
</div>
<div class="modal-overlay" id="expenseModal">
  <div class="modal">
    <div class="modal-header"><h2>Add Expense</h2><button class="modal-close" onclick="closeModal('expenseModal')">&times;</button></div>
    <form id="expenseForm" onsubmit="saveExpense(event)">
      <div class="form-row"><div class="form-group"><label>Category*</label><input name="category" class="form-control" required placeholder="Repair, Insurance, Tax..."></div><div class="form-group"><label>Amount*</label><input name="amount" type="number" step="0.01" class="form-control" required></div></div>
      <div class="form-row"><div class="form-group"><label>Vendor</label><input name="vendor" class="form-control"></div><div class="form-group"><label>Date*</label><input name="date" type="datetime-local" class="form-control" required></div></div>
      <div class="form-row"><div class="form-group"><label>Property ID</label><input name="property_id" type="number" class="form-control"></div><div class="form-group"><label>Receipt Ref</label><input name="receipt_ref" class="form-control"></div></div>
      <div class="form-group"><label>Description</label><textarea name="description" class="form-control"></textarea></div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal('expenseModal')">Cancel</button><button type="submit" class="btn btn-primary">Save Expense</button></div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}<script>document.addEventListener('DOMContentLoaded', loadExpenses);</script>{% endblock %}
